name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test (.NET 8)
    runs-on: windows-latest   # windows for MSBuildLocator compatibility in rewriter tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NetForward.sln

      - name: Build
        run: dotnet build NetForward.sln --no-restore -c Release

      - name: Test
        run: dotnet test NetForward.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/*.trx

  analyze-sample:
    name: Analyze bundled sample (smoke test)
    runs-on: windows-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NetForward.sln

      - name: Build CLI
        run: dotnet build src/NetForward.Cli/NetForward.Cli.csproj --no-restore -c Release

      - name: Run analyze on sample
        run: |
          dotnet run --project src/NetForward.Cli -c Release -- `
            analyze tests/TestAssets/LegacyMvcApp.sln `
            --format json,markdown `
            --output ./ci-reports
        # Exit code 10 = blockers found — acceptable for the legacy sample
        continue-on-error: true

      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: ./ci-reports/

  pack:
    name: Pack dotnet tool
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NetForward.sln

      - name: Pack CLI as dotnet tool
        run: dotnet pack src/NetForward.Cli/NetForward.Cli.csproj -c Release -o ./nupkg

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.nupkg
